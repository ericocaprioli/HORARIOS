<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horários da Escola</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header class="top-bar">
      <div class="status-bar">
        <span class="status-dot"></span>
        <span class="status-text">iOS</span>
        <span class="status-dot"></span>
      </div>
      <h1>Horários Escolares Colégio Estadual Hercília França do Nascimento</h1>
      <p>Selecione o horário para visualização</p>
    </header>

    <section class="search-box">
      <input id="searchInput" type="search" placeholder="Filtrar por nome, turma ou ano..." aria-label="Filtrar horários">
    </section>

    <div id="sectionsContainer"></div>
    <div id="noResults" class="empty-state" hidden>Nenhum horário encontrado. Verifique <code>pdfs.js</code> ou adicione mais arquivos.</div>
  </main>

  <script src="pdfs.js"></script>
  <script>
    const groupOrder = ['general', 'turma', 'professor'];
    const groupTitles = {
      general: 'Visualização geral por turmas',
      turma: 'Turmas',
      professor: 'Professores'
    };

    const noResultsElement = document.getElementById('noResults');
    const searchInput = document.getElementById('searchInput');
    const sectionsContainer = document.getElementById('sectionsContainer');

    function createPdfCard(item) {
      const card = document.createElement('article');
      card.className = 'pdf-card';
      card.classList.add(item.theme || 'theme-default');
      card.onclick = () => window.open(`pdfs/${item.filename}`, '_blank');

      const title = document.createElement('h2');
      title.textContent = item.title;
      card.appendChild(title);

      const subtitle = document.createElement('p');
      subtitle.className = 'subtitle';
      subtitle.textContent = item.category === 'general' ? 'Visão geral' : item.category === 'turma' ? 'Turma' : 'Professor';
      card.appendChild(subtitle);

      return card;
    }

    function createSection(groupKey) {
      const section = document.createElement('section');
      section.className = 'section-block';

      const heading = document.createElement('div');
      heading.className = 'section-heading';
      heading.innerHTML = `<h2>${groupTitles[groupKey]}</h2>`;
      section.appendChild(heading);

      const grid = document.createElement('div');
      grid.className = 'pdf-list';
      section.appendChild(grid);

      return { section, grid };
    }

    function renderList(filterText = '') {
      sectionsContainer.innerHTML = '';
      const query = filterText.trim().toLowerCase();
      const filtered = pdfLinks.filter(item => {
        const target = `${item.title} ${item.description || ''}`.toLowerCase();
        return target.includes(query);
      });

      if (filtered.length === 0) {
        noResultsElement.hidden = false;
        return;
      }

      noResultsElement.hidden = true;

      groupOrder.forEach(groupKey => {
        const groupItems = filtered.filter(item => item.category === groupKey);
        if (groupItems.length === 0) return;

        const { section, grid } = createSection(groupKey);
        groupItems.forEach(item => grid.appendChild(createPdfCard(item)));
        sectionsContainer.appendChild(section);
      });
    }

    searchInput.addEventListener('input', () => renderList(searchInput.value));
    renderList();
  </script>
</body>
</html>
